<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komma</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
        }
        .border-wrapper {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid black;
            box-sizing: border-box;
        }
        .komma-image {
            min-width: 300px;
            min-height: 300px;
            width: 50vmin;
            height: auto;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div class="border-wrapper">
        <img class="komma-image" src="komma-logo.svg" alt="Komma" loading="lazy" />
        <p>Hellooo</p>
    </div>
</body>
</html>
