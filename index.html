<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centered Red Box</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      padding: 0;
      box-sizing: border-box;
    }

    .logo {
      width: 100vw;
      max-width: 1000px;
      aspect-ratio: 1 / 2;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <img class="logo" src="komma-logo.svg" alt="Komma logo">
</body>
</html>
