<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Komma</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            user-select: none;
        }

        .border-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: 10px solid #B19CD9; /* Light purple */
            box-sizing: border-box;
        }

        .komma-image {
            min-width: 300px;
            min-height: 300px;
            width: 50vmin;
            height: auto;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div class="border-wrapper">
        <img class="komma-image" src="komma-logo.svg" alt="Komma" loading="lazy" />
        <p>Hellooo</p>
    </div>
</body>
</html>
